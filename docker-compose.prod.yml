x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    container_name: budget-tracker-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budget-tracker-app
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    shm_size: 1gb
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      INTEGRATIONS_ENC_KEY: ${INTEGRATIONS_ENC_KEY}
      ADMIN_INTEGRATIONS: ${ADMIN_INTEGRATIONS}
      PLAYWRIGHT_PROFILES_DIR: /var/lib/budget-tracker/playwright-profiles
      TZ: Europe/Moscow
      DISPLAY: ":99"
    volumes:
      - playwright-profiles:/var/lib/budget-tracker/playwright-profiles
    ports:
      - "127.0.0.1:3002:3000"

volumes:
  pgdata:
  playwright-profiles:
