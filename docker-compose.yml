services:
  postgres:
    image: postgres:16-alpine
    container_name: budget-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bdg}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bdg}
      POSTGRES_DB: ${DB_NAME:-budget_tracker}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - bdg-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bdg} -d ${DB_NAME:-budget_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bdg-pgdata:
